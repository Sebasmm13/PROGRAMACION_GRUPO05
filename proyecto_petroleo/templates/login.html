<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Título que aparece en la pestaña del navegador -->
  <title>Login — DetectOil IA</title>

  <!-- Bootstrap 5 (librería de estilos y componentes) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Nuestro CSS personalizado -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

  <!-- ════════════════════════════════════════════
       CONTENEDOR DEL LOGIN (centrado en pantalla)
       ════════════════════════════════════════════ -->
  <div class="login-wrapper">
    <div class="login-card">

      <!-- Ícono y título del sistema -->
      <div class="login-logo">🛢️</div>
      <div class="login-titulo">DetectOil IA</div>
      <div class="login-subtitulo">
        Sistema de Detección de Derrames en la Amazonía
      </div>

      <!-- ── MENSAJE DE ERROR (solo aparece si las credenciales son incorrectas) -->
      {% if error %}
        <div class="alerta-error">
          ❌ {{ error }}
        </div>
      {% endif %}

      <!-- ── FORMULARIO DE LOGIN ──────────────────────────────── -->
      <!--  method="POST" envía los datos al servidor de forma segura -->
      <form method="POST" action="/">

        <!-- Campo: Usuario -->
        <label for="usuario" style="color:#aaa; font-size:0.85rem; margin-bottom:5px; display:block;">
          Usuario
        </label>
        <input
          type="text"
          id="usuario"
          name="usuario"
          class="form-control-custom"
          placeholder="Ingresa tu usuario"
          required
        >

        <!-- Campo: Contraseña -->
        <label for="clave" style="color:#aaa; font-size:0.85rem; margin-bottom:5px; display:block;">
          Contraseña
        </label>
        <input
          type="password"
          id="clave"
          name="clave"
          class="form-control-custom"
          placeholder="Ingresa tu contraseña"
          required
        >

        <!-- Espacio -->
        <div style="height: 10px;"></div>

        <!-- Botón de envío -->
        <button type="submit" class="btn-ingresar">
          🔐 Ingresar al Sistema
        </button>
      </form>

      <!-- Nota de credenciales de prueba (quitar en producción) -->
      <p style="text-align:center; font-size:0.75rem; color:#555; margin-top:20px;">
        🧪 Demo: <strong style="color:#888;">admin</strong> / <strong style="color:#888;">1234</strong>
      </p>

    </div>
  </div>

  <!-- Bootstrap JS (necesario para componentes interactivos) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
