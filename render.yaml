# render.yaml — Configuración automática para Render.com
# Render lo lee y configura el despliegue solo.

services:
  - type: web          # Tipo de servicio: sitio web estático
    name: detectoil-ia # Nombre que aparecerá en Render (puedes cambiarlo)
    env: static        # Indica que es un sitio estático (HTML/CSS/JS)
    rootDir: proyecto_petroleo_react   # Subcarpeta del repo donde está el proyecto

    buildCommand: npm install && npm run build   # Cómo construir el proyecto
    staticPublishPath: ./dist                    # Carpeta que genera Vite al construir

    routes:
      # Redirige todo al index.html para que React Router funcione
      - type: rewrite
        source: /*
        destination: /index.html
