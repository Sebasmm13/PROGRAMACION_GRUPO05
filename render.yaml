# render.yaml — Configuración automática para Render.com
# Render lo lee y configura el despliegue solo.

services:
  # 1. Backend (API Python - Flask)
  - type: web
    name: detectoil-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

  # 2. Frontend (React)
  - type: web
    name: detectoil-ia
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: detectoil-backend
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
